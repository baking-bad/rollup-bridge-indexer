# Standalone config for the alias-recheck case. See README.md.
# sqlite + oneshot. Runs ONLY the XTZ deposit index (value-transfer from 0x…feed via
# on_xtz_deposit) — three deposits land on one non-alias EVM receiver, so with
# ALIAS_RECHECK_SECONDS=0 the 2nd/3rd sightings exercise the re-resolution UPDATE branch.

spec_version: 3.0
package: rollup_bridge_indexer


database:
  kind: sqlite
  path: ${SQLITE_PATH:-/tmp/bridge_alias_recheck.sqlite}


datasources:
  tzkt:
    kind: tezos.tzkt
    url: ${TZKT_URL}

  metadata:
    kind: tzip_metadata
    network: ${NETWORK}
    url: ${METADATA_URL}

  tezos_node:
    kind: http
    url: ${TEZOS_NODE_URL}

  etherlink_node:
    kind: evm.node
    url: ${ETHERLINK_NODE_URL}
    http:
      batch_size: 100
      ratelimit_rate: 900
      ratelimit_period: 60
      ratelimit_sleep: 10

  rollup_node:
    kind: http
    url: ${ROLLUP_NODE_URL}
    http:
      retry_count: 2
      retry_sleep: 1.0
      retry_multiplier: 1.0
      connection_timeout: 1
      request_timeout: 4


contracts:
  tezos_smart_rollup:
    kind: tezos
    address: ${SMART_ROLLUP_ADDRESS}
    typename: rollup

  etherlink_deposit_sender:
    kind: evm
    # FEED_DEPOSIT_ADDR — synthetic `from` of XTZ deposit value-transfers.
    address: '0x000000000000000000000000000000000000feed'
    typename: kernel


indexes:
  etherlink_xtz_deposit_transactions:
    kind: evm.transactions
    first_level: ${L2_FIRST_LEVEL}
    last_level: ${L2_LAST_LEVEL}
    datasources:
      - etherlink_node
    handlers:
      - callback: etherlink.on_xtz_deposit
        from_: etherlink_deposit_sender


advanced:
  unsafe_sqlite: true
  reindex:
    config_modified: ignore
    schema_modified: ignore
    migration: ignore
    rollback: ignore
    manual: wipe
