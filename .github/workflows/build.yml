name: Build
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - 'master'
  pull_request:
    branches:
      - 'master'

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    env:
      DOCKER_REGISTRY: ghcr.io
      DOCKER_IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to the registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr

      # Build into the local Docker engine first so we can prove the indexer actually
      # starts before publishing. Populates the gha cache, so the push build below is a
      # near-instant cache hit.
      - name: Build image for smoke test
        uses: docker/build-push-action@v5
        with:
          # Path context, not the default git context: the latter walks the
          # rollup_bridge_indexer -> . self-symlink and leaks tests/** into the image.
          context: .
          file: Dockerfile
          load: true
          tags: rollup-bridge-indexer:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Hermetic (no chain/DB access): resolves the package, runs package.initialize() as
      # the runtime user, imports all handlers/hooks/types, and validates base + overlay
      # config. This is what the flatten regression broke. `--boot` (full DB boot) is left
      # to local runs via `make docker-test BOOT=1` to keep the publish gate offline.
      - name: Smoke test (indexer starts in the container)
        run: tests/e2e/smoke_test.sh rollup-bridge-indexer:smoke

      - name: Publish image
        uses: docker/build-push-action@v5
        with:
          context: .  # path context — see the smoke build above
          file: Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
