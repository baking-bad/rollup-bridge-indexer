datasources:
  tzkt:
    kind: tezos.tzkt
    url: ${TZKT_URL}

  metadata:
    kind: tzip_metadata
    # Hardcoded, NOT ${NETWORK} (= tezosx-shadownet, the docker-compose config selector).
    # tzip_metadata looks up L1 Tezos contract addresses; this deployment's L1 is
    # shadownet (TZKT_URL=api.shadownet.tzkt.io). The dipdup metadata service indexes
    # that exact chain under the name `shadownet`. (Its `tezosx` network is a different
    # chain — its contracts don't exist on this L1, so it would never resolve our tokens.)
    network: shadownet
    url: ${METADATA_URL}

  tezos_node:
    kind: http
    url: ${TEZOS_NODE_URL}

  etherlink_node:
    kind: evm.node
    url: ${ETHERLINK_NODE_URL}
    # This overlay redefines the whole `datasources` block (to hardcode metadata.network).
    # DipDup merges -c files with a shallow top-level dict.update, so the base dipdup.yaml
    # `etherlink_node.http` is dropped entirely here. Without it ratelimit_rate defaults to 0
    # (no client-side throttling) → we hammer the flaky previewnet node and self-inflict 503
    # storms. Mirror the base values to throttle. tezosx has no Subsquid, so the node carries
    # the full L2 backfill — batch_size/ratelimit matter even more than on mainnet.
    http:
      batch_size: 100
      ratelimit_rate: 900
      ratelimit_period: 60
      ratelimit_sleep: 10

  rollup_node:
    kind: http
    url: ${ROLLUP_NODE_URL}
    http:
      retry_count: 2
      retry_sleep: 1.0
      retry_multiplier: 1.0
      connection_timeout: 1
      request_timeout: 4

  # L2 Michelson side of Tezos X — a TzKT over the rollup's Michelson chain
  # (previewnet: https://api.previewnet.tezosx.tzkt.io — base host, DipDup appends /v1).
  tezos_x_michelson_tzkt:
    kind: tezos.tzkt
    url: ${TEZOSX_MICHELSON_TZKT_URL}

contracts:
  tezos_smart_rollup:
    kind: tezos
    address: ${SMART_ROLLUP_ADDRESS}
    typename: rollup

  tezos_fast_withdrawal_native:
    kind: tezos
    address: ${FAST_WITHDRAWAL_NATIVE_ADDRESS}
    typename: fast_withdrawal

  # TEZLINK_DEPOSITOR — synthetic source of L1->L2 Michelson XTZ deposits: the kernel
  # const [0u8; 22] (all-zero serialized implicit contract) rendered in base58.
  # See handlers/michelson_deposit.py for the kernel citations.
  tezos_x_michelson_depositor:
    kind: tezos
    address: tz1Ke2h7sDdakHJQh8WX4Z372du1KChsksyU

  etherlink_rollup_kernel:
    kind: evm
    address: '0x0000000000000000000000000000000000000000'
    typename: kernel

  etherlink_deposit_sender:
    kind: evm
    # FEED_DEPOSIT_ADDR — synthetic `from` of all deposit-injection txs in the new kernel
    address: '0x000000000000000000000000000000000000feed'
    typename: kernel

  etherlink_rollup_kernel_native:
    kind: evm
    address: '0x0000000000000000000000000000000000000000'
    typename: kernel_native

  # TEZOSX_CALLER — kernel-only injector: synthetic `from` of all init_tezosx_alias txs
  # (and other kernel-injected Tezos X calls, e.g. claim_xtz).
  tezosx_caller:
    kind: evm
    address: '0x7e20580000000000000000000000000000000001'

  l2_withdrawal_precompile_fa:
    kind: evm
    address: '0xff00000000000000000000000000000000000002'
    typename: kernel

  l2_withdrawal_precompile_native:
    kind: evm
    address: '0xff00000000000000000000000000000000000001'
    typename: kernel_native

  l2_tzbtc_token:
    kind: evm
    address: '0x03e39ff2b379fbcd9284ab457113d82ff4dabbf4'
    typename: l2_token

  l2_sirius_token:
    kind: evm
    address: '0x22565c35ad439cbb8399bfc733c56c9f5a10e3a6'
    typename: l2_token

  l2_usdt_token:
    kind: evm
    address: '0x3dff505a2a69e6e0b05fdb71b5f6ddd514fdaf47'
    typename: l2_token

indexes:
  tezos_head:
    kind: tezos.head
    datasources:
      - tzkt
    callback: tezos.on_head

  tezos_rollup_cement:
    kind: tezos.operations
    first_level: ${L1_FIRST_LEVEL}
    datasources:
      - tzkt
    types:
      - sr_cement
    contracts:
      - tezos_smart_rollup
    handlers:
      - callback: tezos.on_cement_commitment
        pattern:
          - type: sr_cement
            destination: tezos_smart_rollup


  tezos_deposit_operations:
    kind: tezos.operations
    first_level: ${L1_FIRST_LEVEL}
    datasources:
      - tzkt
    types:
      - transaction
    contracts:
      - tezos_smart_rollup
    handlers:
      - callback: tezos.on_rollup_call
        pattern:
          - type: transaction
            destination: tezos_smart_rollup
            entrypoint: default


  tezos_claim_fast_withdrawal_operations:
    kind: tezos.operations
    first_level: ${L1_FIRST_LEVEL}
    datasources:
      - tzkt
    types:
      - transaction
    contracts:
      - tezos_fast_withdrawal_native
    handlers:
      - callback: tezos.on_claim_xtz_fast_withdrawal
        pattern:
          - type: transaction
            destination: tezos_fast_withdrawal_native
            entrypoint: payout_withdrawal

  etherlink_deposit_events:
    kind: evm.events
    first_level: ${L2_FIRST_LEVEL}
    datasources:
      - etherlink_node
    handlers:
      # NOTE: here was etherlink_rollup_kernel which was a legacy 'precompile' for fa
      - callback: etherlink.on_deposit
        contract: l2_withdrawal_precompile_fa
        name: Deposit

  etherlink_xtz_deposit_transactions:
    kind: evm.transactions
    first_level: ${L2_FIRST_LEVEL}
    datasources:
      - etherlink_node
    handlers:
      - callback: etherlink.on_xtz_deposit
        from_: etherlink_deposit_sender


  # L2 Michelson XTZ deposits (tz1 receiver): synthetic pseudo-transactions emitted by
  # the kernel from TEZLINK_DEPOSITOR; matched to the L1 leg by reconstructed op-hash
  # (handlers/michelson_matcher.py). Set L2_MICHELSON_FIRST_LEVEL to the first
  # event-era kernel level — earlier synthetic ops use an unverified derivation and
  # would sit unmatched forever.
  tezos_x_michelson_deposits:
    kind: tezos.operations
    first_level: ${L2_MICHELSON_FIRST_LEVEL}
    datasources:
      - tezos_x_michelson_tzkt
    types:
      - transaction
    contracts:
      - tezos_x_michelson_depositor
    handlers:
      - callback: tezos.on_michelson_deposit
        pattern:
          - type: transaction
            source: tezos_x_michelson_depositor

  # Alias registry: every Tezos X alias emits Initialized(string,bytes,uint256) once, from its
  # own address — not wildcard-subscribable, so we filter txs by the kernel injector `from_`
  # and parse receipt logs in the handler (handlers/etherlink/on_alias_initialized.py).
  etherlink_alias_initialized_transactions:
    kind: evm.transactions
    first_level: ${L2_FIRST_LEVEL}
    datasources:
      - etherlink_node
    handlers:
      - callback: etherlink.on_alias_initialized
        from_: tezosx_caller

  etherlink_withdrawal_events:
    kind: evm.events
    first_level: ${L2_FIRST_LEVEL}
    datasources:
      - etherlink_node
    handlers:
      # NOTE: etherlink_rollup_kernel no longer in use for withdrawal, never was for tezosx rollup
      - callback: etherlink.on_withdraw
        contract: l2_withdrawal_precompile_fa
        name: Withdrawal
      - callback: etherlink.on_xtz_withdraw
        contract: l2_withdrawal_precompile_native
        name: Withdrawal
      - callback: etherlink.on_xtz_withdraw
        contract: l2_withdrawal_precompile_native
        name: FastWithdrawal

  tezos_withdrawal_operations:
    kind: tezos.operations
    first_level: ${L1_FIRST_LEVEL}
    datasources:
      - tzkt
    types:
      - sr_execute
    contracts:
      - tezos_smart_rollup
      - tezos_fast_withdrawal_native
    handlers:
      - callback: tezos.on_rollup_execute
        pattern:
          - type: sr_execute
            destination: tezos_smart_rollup
      - callback: tezos.on_rollup_execute
        pattern:
          - type: sr_execute
            destination: tezos_fast_withdrawal_native

  etherlink_token_balance_update_events:
    kind: evm.events
    datasources:
      - etherlink_node
    handlers:
      - callback: etherlink.on_transfer
        contract: l2_tzbtc_token
        name: Transfer
      - callback: etherlink.on_transfer
        contract: l2_sirius_token
        name: Transfer
      - callback: etherlink.on_transfer
        contract: l2_usdt_token
        name: Transfer
